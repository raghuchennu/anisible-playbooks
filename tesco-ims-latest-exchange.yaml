AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create 2 VPCs, 3 private subnets, 2 security groups,
  and 5 EC2 instances with validated CIDR inputs.

Parameters:
  Vpc1CIDR:
    Type: String
    Description: CIDR block for VPC 1 (must be /21-/28 in 10.x.x.x format)
    AllowedPattern: '^10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}/(2[1-8])$'
    ConstraintDescription: Must be a valid CIDR block from /21 to /28 in 10.x.x.x/ format.

  Vpc2CIDR:
    Type: String
    Description: CIDR block for VPC 2 (must be /21-/28 in 10.x.x.x format)
    AllowedPattern: '^10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}/(2[1-8])$'
    ConstraintDescription: Must be a valid CIDR block from /21 to /28 in 10.x.x.x/ format.

  PrivateSubnet1CIDR:
    Type: String
    Description: CIDR block for Private Subnet 1 in VPC 1 (must be /23-/28 in 10.x.x.x format)
    AllowedPattern: '^10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}/(2[3-8])$'
    ConstraintDescription: Must be a valid CIDR block from /23 to /28 in 10.x.x.x/ format.

  PrivateSubnet2CIDR:
    Type: String
    Description: CIDR block for Private Subnet 2 in VPC 1 (must be /23-/28 in 10.x.x.x format)
    AllowedPattern: '^10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}/(2[3-8])$'
    ConstraintDescription: Must be a valid CIDR block from /23 to /28 in 10.x.x.x/ format.

  PrivateSubnet3CIDR:
    Type: String
    Description: CIDR block for Private Subnet 3 in VPC 1 (must be /23-/28 in 10.x.x.x format)
    AllowedPattern: '^10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}/(2[3-8])$'
    ConstraintDescription: Must be a valid CIDR block from /23 to /28 in 10.x.x.x/ format.

  ImageId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for launching the EC2 instances

  InstanceType:
    Type: String
    Description: EC2 instance type for all instances

Resources:
  # VPC 1
  VPC1:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref Vpc1CIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC1

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet-1-VPC1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet-2-VPC1

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC1
      CidrBlock: !Ref PrivateSubnet3CIDR
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet-3-VPC1

  # VPC 2 (without any routing or NAT Gateway)
  VPC2:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref Vpc2CIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC2

  SecurityGroup1:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group 1 with no inbound traffic
      VpcId: !Ref VPC1
      SecurityGroupIngress: []  # No inbound traffic allowed
      SecurityGroupEgress:
        - IpProtocol: "-1"  # Allow all outbound traffic
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: Web-SG

  SecurityGroup2:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group 2 with no inbound traffic
      VpcId: !Ref VPC1
      SecurityGroupIngress: []  # No inbound traffic allowed
      SecurityGroupEgress:
        - IpProtocol: "-1"  # Allow all outbound traffic
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: DB-SG

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1
      ImageId: !Ref ImageId
      SecurityGroupIds:
        - !Ref SecurityGroup1
      Tags:
        - Key: Name
          Value: Web-Server-1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet2
      ImageId: !Ref ImageId
      SecurityGroupIds:
        - !Ref SecurityGroup1
      Tags:
        - Key: Name
          Value: Web-Server-2

  EC2Instance3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet3
      ImageId: !Ref ImageId
      SecurityGroupIds:
        - !Ref SecurityGroup1
      Tags:
        - Key: Name
          Value: Web-Server-3

  EC2Instance4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1
      ImageId: !Ref ImageId
      SecurityGroupIds:
        - !Ref SecurityGroup2
      Tags:
        - Key: Name
          Value: DB-Server-1

  EC2Instance5:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet2
      ImageId: !Ref ImageId
      SecurityGroupIds:
        - !Ref SecurityGroup2
      Tags:
        - Key: Name
          Value: DB-Server-2

Outputs:
  VPC1Id:
    Description: ID of VPC 1
    Value: !Ref VPC1

  VPC2Id:
    Description: ID of VPC 2
    Value: !Ref VPC2

  PrivateSubnet1Id:
    Description: ID of Private Subnet 1 in VPC1
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: ID of Private Subnet 2 in VPC1
    Value: !Ref PrivateSubnet2

  PrivateSubnet3Id:
    Description: ID of Private Subnet 3 in VPC1
    Value: !Ref PrivateSubnet3
